name: Bug Report
description: Report a bug to help us improve Sonora
labels: [BUG]
body:
  - type: checkboxes
    id: pre-submission-checklist
    attributes:
      label: Bug Submission Checklist
      description: >
        Before submitting, please ensure you have completed the following steps. 
        Incomplete reports or reports for versions other than the latest debug build may be closed.
      options:
        - label: I have tested this bug on the [latest debug version](https://github.com/koiverse/Sonora/actions).
          required: true
        - label: I have searched existing issues (open and closed) to avoid duplicates.
          required: true
        - label: This report describes a single bug.
          required: true
        - label: The issue title is clear and concise.
          required: true

  - type: dropdown
    id: component
    attributes:
      label: Where does the bug happen?
      description: Select the area of the app.
      options:
        - ðŸŽµ Music Player (Now Playing)
        - ðŸ“š Library / Playlists
        - ðŸ” Search
        - âš™ï¸ Settings
        - ðŸ“¥ Downloads
        - ðŸŽ¨ UI / Visuals
        - ðŸ”Œ Integrations (Discord/LastFM/ListenBrainz)
        - ðŸ“± Widgets / Notification
        - â“ Other
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: How often does it happen?
      options:
        - ðŸ”´ Every time (100%)
        - ðŸŸ  Often (> 50%)
        - ðŸŸ¡ Sometimes (< 50%)
        - ðŸŸ¢ Rarely (Once or twice)
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: How can we make this bug happen again?
      placeholder: |
        1. Open the app
        2. Navigate to '...'
        3. Tap on '....'
        4. See error/crash
    validations:
      required: true

  - type: textarea
    id: behavior-comparison
    attributes:
      label: Expected vs. Actual Behavior
      description: Describe what you expected to see and what actually occurred.
      placeholder: |
        Expected: The archive should load within 2 seconds.
        Actual: The app freezes and eventually crashes.
    validations:
      required: true

  - type: textarea
    id: visual-evidence
    attributes:
      label: Visual Evidence
      description: Screenshots or screen recordings are highly encouraged to help us diagnose the UI/UX issues.
      placeholder: Drag and drop files here...

  - type: textarea
    id: logs
    attributes:
      label: Logs (Critical)
      description: |
        Please provide `adb logcat` output or app-generated logs. 
        **Note:** Without logs, it is often impossible to fix internal crashes.
      placeholder: Paste your logs here or attach a .txt file.
    validations:
      required: true

  - type: input
    id: environment-app-version
    attributes:
      label: Sonora Version
      description: Found in Settings -> About.
      placeholder: e.g., 0.5.3 (Debug)
    validations:
      required: true

  - type: dropdown
    id: android-version
    attributes:
      label: Android Version
      options:
        - Android 16 (Preview)
        - Android 15
        - Android 14
        - Android 13
        - Android 12
        - Android 11
        - Android 10
        - Android 9 or older
        - Custom ROM
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Anything else we should know? (e.g., specific device model, recent system updates, other apps that might be interfering).
      placeholder: e.g., "I am using a Pixel 7 Pro running LineageOS 20."
